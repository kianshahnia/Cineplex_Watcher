services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # interpolated from .env
      POSTGRES_DB: cineplex_watcher
    # NO ports: — internal network only
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # NO ports:
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # NO ports:, NO bind mount, NO --reload.
    # All config comes from .env — no environment: overrides here, so the
    # .env file is the single source of truth (the dev compose hardcodes
    # DATABASE_URL in environment:, which would silently override .env).
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at BUILD time — changing it requires a
        # rebuild (docker compose ... up -d --build frontend), not a restart.
        NEXT_PUBLIC_API_BASE: https://api.cinewatch.ca
    restart: unless-stopped
    # NO ports: — Caddy reaches it over the internal network.
    environment:
      # Runtime env for server-side (RSC) fetches over the Docker network.
      INTERNAL_API_BASE: http://backend:8000
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # certificates — MUST persist across restarts
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
